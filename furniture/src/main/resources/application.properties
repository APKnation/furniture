spring.application.name=furniture
server.port=${PORT:8080}

# Database Configuration (XAMPP MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/furniture_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Multipart file configuration (for uploading product images if needed)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
