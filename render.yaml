services:
  # 1. MySQL Database (Private Service)
  - type: pserv
    name: furniture-mysql
    env: image
    image:
      url: mysql:8
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1
    envVars:
      - key: MYSQL_DATABASE
        value: furniture_db
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

  # 2. Spring Boot & React App (Web Service)
  - type: web
    name: furniture-backend
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_URL
        value: jdbc:mysql://furniture-mysql:3306/furniture_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: furniture-mysql
          envVarKey: MYSQL_ROOT_PASSWORD
